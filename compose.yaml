services:
  db:
    image: postgres:18.3-alpine3.23
    container_name: erp_test_db
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - api-network
    environment:
      - POSTGRES_PASSWORD=password
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    develop:
      watch:
        - action: sync
          path: ./
          target: /api
          ignore:
            - node_modules
        - action: rebuild
          path: package.json
        - action: rebuild
          path: tsconfig.json
        - action: rebuild
          path: Dockerfile
        - action: rebuild
          path: compose.yaml
    env_file:
      - .env
    ports:
      - "${DEV_PORT}:8000"
    expose:
      - "8000"
    networks:
      - api-network

networks:
  api-network:
    name: erp-network
    external: true

volumes:
  pgdata: