services:
  api:
    build:
      context: .
      target: dev
    volumes:
      - .:/api
      - /api/node_modules
    env_file:
      - .env
    ports:
      - "${DEV_PORT}:8000"
    expose:
      - "8000"
    networks:
      - api-network

networks:
  api-network:
    name: erp-network
    external: true
